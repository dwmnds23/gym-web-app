<style>
:root{
  --bg:#0c0d10; --bg2:#101218; --card:#15171d; --card2:#1c1f28;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
  --ink:#f3f4f6; --mut:#8b919d; --mut2:#5d636e;
  --A:#b8ff3c; --Adim:rgba(184,255,60,.14);
  --B:#ff8c3a; --Bdim:rgba(255,140,58,.14);
  --C:#3da5ff; --Cdim:rgba(61,165,255,.16);
  --BW:#cdd3dd;
  --danger:#ff5a5a;
  --shadow:0 18px 40px -18px rgba(0,0,0,.8);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(184,255,60,.06), transparent 60%),
    radial-gradient(1000px 500px at -10% 10%, rgba(255,140,58,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Manrope',-apple-system,system-ui,sans-serif;
  min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
.wrap{max-width:560px;margin:0 auto;padding:18px 16px 120px}
.disp{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em}

/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 20px}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:38px;height:38px;border-radius:11px;background:var(--card2);border:1px solid var(--line);display:grid;place-items:center}
.logo svg{width:22px;height:22px}
.brand h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:.06em;text-transform:uppercase;margin:0;line-height:1}
.brand .sub{font-size:11px;color:var(--mut);letter-spacing:.18em;text-transform:uppercase;margin-top:3px;font-weight:600}
.iconbtn{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--ink);display:grid;place-items:center;font-size:18px;cursor:pointer}
.iconbtn:active{transform:scale(.94)}

/* next-up banner */
.next{position:relative;border-radius:18px;padding:16px 18px;margin-bottom:18px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(135deg,var(--card2),var(--card))}
.next .k{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);font-weight:700}
.next .v{font-family:'Oswald',sans-serif;font-size:23px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-top:6px}
.next .m{font-size:13px;color:var(--mut);margin-top:3px}
.next .dot{position:absolute;top:16px;right:16px;width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 0 currentColor;animation:pulse 2.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 currentColor}70%{box-shadow:0 0 0 9px transparent}100%{box-shadow:0 0 0 0 transparent}}

.seclabel{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:6px 4px 12px}

/* workout cards grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wcard{position:relative;border-radius:18px;padding:16px 15px 15px;background:var(--card);border:1px solid var(--line);cursor:pointer;overflow:hidden;transition:transform .12s ease,border-color .2s}
.wcard:active{transform:scale(.97)}
.wcard .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.wcard .tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:4px 8px;border-radius:999px}
.wcard h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;text-transform:uppercase;letter-spacing:.02em;margin:13px 0 4px}
.wcard .mus{font-size:12px;color:var(--mut);line-height:1.35}
.wcard .meta{font-size:11px;color:var(--mut2);margin-top:10px;font-weight:600}
.wcard.up{border-color:transparent;box-shadow:var(--shadow)}
.wcard.up::after{content:"";position:absolute;inset:0;border-radius:18px;padding:1.5px;background:linear-gradient(135deg,currentColor,transparent 60%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

/* workout screen */
.head{display:flex;align-items:flex-start;gap:12px;margin-bottom:6px}
.back{flex:none;width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--ink);display:grid;place-items:center;font-size:20px;cursor:pointer}
.back:active{transform:scale(.94)}
.htitle h2{font-family:'Oswald',sans-serif;font-weight:600;font-size:24px;text-transform:uppercase;letter-spacing:.02em;margin:0;line-height:1.05}
.htitle .hsub{font-size:13px;color:var(--mut);margin-top:5px}
.datechip{display:inline-block;margin:14px 0 8px;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--bg);padding:6px 12px;border-radius:999px}

.ex{border-radius:18px;background:var(--card);border:1px solid var(--line);padding:15px 15px 14px;margin-bottom:12px}
.ex .exhead{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ex .name{font-weight:800;font-size:16px;letter-spacing:-.01em}
.prev{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:13px}
.prev .lab{color:var(--mut2);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.prev .val{font-family:'Oswald',sans-serif;font-weight:600;font-size:16px;letter-spacing:.02em}
.prev .none{color:var(--mut2);font-style:italic;font-size:13px;font-family:'Manrope'}
.copy{margin-left:auto;font-size:11px;font-weight:800;letter-spacing:.04em;padding:6px 10px;border-radius:9px;background:var(--card2);border:1px solid var(--line);color:var(--ink);cursor:pointer}
.copy:active{transform:scale(.95)}
.copy:disabled{opacity:.35}
.inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:13px}
.field label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:0 0 5px 2px}
.field input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:12px 10px;font-size:18px;font-family:'Oswald',sans-serif;font-weight:600;text-align:center;outline:none}
.field input:focus{border-color:var(--line2)}
.notes{margin-top:8px}
.notes input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 12px;font-size:14px;font-family:'Manrope';outline:none}
.notes input::placeholder{color:var(--mut2)}

/* edit mode */
.editrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.editrow input.rn{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:11px 12px;font-size:15px;font-family:'Manrope';outline:none}
.minibtn{flex:none;width:38px;height:40px;border-radius:10px;background:var(--card2);border:1px solid var(--line);color:var(--ink);display:grid;place-items:center;font-size:16px;cursor:pointer}
.minibtn:active{transform:scale(.93)}
.minibtn.del{color:var(--danger)}
.addex{width:100%;padding:13px;border-radius:13px;background:transparent;border:1.5px dashed var(--line2);color:var(--mut);font-weight:700;font-size:14px;cursor:pointer;margin-top:2px}
.addex:active{transform:scale(.99)}

/* buttons */
.savebar{position:fixed;left:0;right:0;bottom:0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:20}
.savebar .inner{max-width:560px;margin:0 auto}
.btn{width:100%;border:none;border-radius:15px;padding:17px;font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;color:var(--bg)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.rowbtns{display:flex;gap:10px}

/* history */
.hcard{border-radius:16px;background:var(--card);border:1px solid var(--line);padding:14px 15px;margin-bottom:11px}
.hcard .hh{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.hcard .hdate{font-family:'Oswald',sans-serif;font-weight:600;font-size:17px;letter-spacing:.02em}
.hcard .hlab{font-size:12px;color:var(--mut);margin-top:2px}
.hpill{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:999px}
.hbody{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;display:none}
.hbody.open{display:block}
.hline{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0}
.hline .hn{color:var(--ink)}
.hline .hv{font-family:'Oswald',sans-serif;font-weight:600;color:var(--mut);white-space:nowrap}
.hnote{font-size:12.5px;color:var(--mut);margin:-2px 0 8px;padding-left:1px;line-height:1.4}
.prevnote{font-size:12.5px;color:var(--mut);margin-top:8px;line-height:1.4}
.exnotewrap{display:flex;align-items:center;gap:8px;margin-top:11px}
.exnoteic{color:var(--mut2);font-size:13px;flex:none}
.exnote{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:'Manrope';outline:none}
.exnote::placeholder{color:var(--mut2)}
.exnote:focus{border-color:var(--line2)}
.hdel{margin-top:10px;font-size:12px;font-weight:700;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px}
.empty{text-align:center;color:var(--mut2);padding:50px 20px;font-size:14px}
.empty .big{font-family:'Oswald',sans-serif;font-size:20px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* settings sheet */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:40;display:none;align-items:flex-end}
.modal.open{display:flex}
.sheet{background:var(--bg2);border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--line);width:100%;max-width:560px;margin:0 auto;padding:8px 18px calc(24px + env(safe-area-inset-bottom));max-height:84vh;overflow:auto}
.grab{width:42px;height:5px;border-radius:3px;background:var(--line2);margin:8px auto 16px}
.sheet h3{font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:18px;margin:6px 0 4px}
.sheet p{color:var(--mut);font-size:13px;line-height:1.5;margin:0 0 16px}
.sopt{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:13px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.sopt:active{transform:scale(.99)}
.sopt .ic{font-size:19px}
.sopt small{display:block;color:var(--mut);font-weight:500;font-size:12px;margin-top:2px}
textarea.imp{width:100%;height:120px;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:13px;padding:12px;font-size:12px;font-family:monospace;outline:none;margin-bottom:10px}

/* toast */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-weight:800;font-size:14px;padding:13px 22px;border-radius:999px;z-index:60;opacity:0;transition:.25s;box-shadow:0 14px 30px -8px rgba(0,0,0,.6);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fade{animation:fade .4s ease both}

/* week strip */
.weekstrip{border-radius:16px;background:var(--card);border:1px solid var(--line);padding:13px 15px;margin-bottom:18px;cursor:pointer}
.weekstrip:active{transform:scale(.99)}
.wsh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px}
.wsl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);font-weight:700}
.wsn{font-family:'Oswald',sans-serif;font-size:22px;font-weight:600;color:var(--A)}
.wsn small{font-family:'Manrope';font-size:12px;color:var(--mut);font-weight:600;letter-spacing:0}
.wddays{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}
.wd{display:flex;flex-direction:column;align-items:center;gap:5px}
.wdn{font-size:10px;color:var(--mut2);font-weight:700}
.wdc{width:100%;aspect-ratio:1;max-width:38px;border-radius:9px;display:grid;place-items:center;font-size:13px;font-weight:700;background:var(--bg2);color:var(--mut);border:1px solid transparent}
.wdc.on{background:var(--A);color:var(--bg)}
.wdc.today{border-color:var(--line2)}
.wdc.on.today{border-color:#fff}

/* stats */
.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center}
.stat .sv{font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;line-height:1}
.stat .sv small{font-size:13px;font-weight:500;margin-left:1px}
.stat .sl{font-size:10.5px;color:var(--mut);margin-top:6px;letter-spacing:.04em}

/* calendar */
.calnav{display:flex;align-items:center;justify-content:space-between;margin:6px 0 12px}
.calmonth{font-family:'Oswald',sans-serif;font-size:19px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.navb{width:42px;height:42px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--ink);font-size:20px;cursor:pointer}
.navb:active{transform:scale(.94)}
.calgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
.cah{text-align:center;font-size:10px;color:var(--mut2);font-weight:700;padding-bottom:4px}
.cc{aspect-ratio:1;border-radius:10px;display:grid;place-items:center;font-size:14px;font-weight:600;background:var(--card);border:1px solid var(--line);color:var(--mut)}
.cc.empty{background:transparent;border:none}
.cc.on{background:var(--A);color:var(--bg);border-color:var(--A);font-weight:800}
.cc.today{border-color:var(--line2);box-shadow:inset 0 0 0 1px var(--line2)}
.cc.on.today{box-shadow:inset 0 0 0 2px #fff}

/* exercise progress */
.exhead{display:flex;align-items:center;justify-content:space-between;gap:8px}
.prog{flex:none;width:34px;height:34px;border-radius:9px;background:var(--card2);border:1px solid var(--line);font-size:15px;cursor:pointer;display:grid;place-items:center}
.prog:active{transform:scale(.92)}
.chartbox{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px 8px 4px;margin-top:4px}
.caxt{fill:var(--mut2);font-size:10px;font-family:'Manrope',sans-serif}

/* cardio + both day coloring */
.wdc.oncardio{background:var(--C);color:#fff}
.wdc.onboth{background:linear-gradient(135deg,var(--A) 0 49.5%,var(--C) 50.5% 100%);color:#fff}
.cc.oncardio{background:var(--C);color:#fff;border-color:var(--C);font-weight:800}
.cc.onboth{background:linear-gradient(135deg,var(--A) 0 49.5%,var(--C) 50.5% 100%);color:#fff;border:none;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.45)}
.cc.onboth.today,.cc.oncardio.today{box-shadow:inset 0 0 0 2px #fff}
.callegend{display:flex;gap:16px;justify-content:center;margin:2px 0 14px;font-size:12px;color:var(--mut)}
.callegend span{display:inline-flex;align-items:center;gap:6px}
.lgd{width:11px;height:11px;border-radius:3px;display:inline-block}

/* cardio card on home */
.cardiocard{position:relative;border-radius:18px;padding:17px 16px;background:var(--card);border:1px solid var(--line);cursor:pointer;overflow:hidden;margin-top:12px;display:flex;align-items:center;gap:14px;color:var(--C)}
.cardiocard:active{transform:scale(.98)}
.cardiocard .bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--C)}
.cardiocard .cico{font-size:24px}
.cardiocard h3{font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;text-transform:uppercase;letter-spacing:.02em;margin:0;color:var(--C)}
.cardiocard .csub{font-size:12px;color:var(--mut);margin-top:2px}

/* body weight card */
.bwcard{border-radius:16px;background:var(--card);border:1px solid var(--line);padding:14px 16px;margin-bottom:18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bwcard:active{transform:scale(.99)}
.bwcard .bwl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:700}
.bwcard .bwv{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;margin-top:3px}
.bwcard .bwv small{font-size:13px;color:var(--mut);font-family:'Manrope';font-weight:600}
.bwcard .bwgo{font-size:12px;font-weight:700;color:var(--BW)}

/* sport chips */
.sports{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:6px 0 18px}
.sport{display:flex;align-items:center;gap:10px;padding:14px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);color:var(--ink);font-weight:700;font-size:15px;cursor:pointer}
.sport:active{transform:scale(.98)}
.sport .se{font-size:20px}
.sport.sel{border-color:var(--C);background:var(--Cdim);color:var(--C)}
.cardioform .field2{margin-bottom:13px}
.cardioform label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:0 0 6px 2px}
.cardioform input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:14px 13px;font-size:17px;font-family:'Oswald',sans-serif;font-weight:600;outline:none}
.cardioform input:focus{border-color:var(--line2)}
.cardioform input::placeholder{color:var(--mut2);font-family:'Manrope';font-weight:500}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.stag>*{animation:fade .45s ease both}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="savebar" id="savebar" style="display:none"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------- config ---------- */
var ORDER=["A1","B1","A2","B2"];
var META={
  A1:{type:"Α",ses:1,mus:"Στήθος · Πλάτη · Ώμοι",color:"var(--A)",tag:"Α",full:"Τύπος Α · Προπόνηση 1"},
  A2:{type:"Α",ses:2,mus:"Στήθος · Πλάτη · Ώμοι",color:"var(--A)",tag:"Α",full:"Τύπος Α · Προπόνηση 2"},
  B1:{type:"Β",ses:1,mus:"Χέρια · Πόδια",color:"var(--B)",tag:"Β",full:"Τύπος Β · Προπόνηση 1"},
  B2:{type:"Β",ses:2,mus:"Χέρια · Πόδια",color:"var(--B)",tag:"Β",full:"Τύπος Β · Προπόνηση 2"}
};
var DEFAULTS={
  A1:[{name:"Smith machine pull ups",note:"Σωματικό βάρος"},{name:"Bench push ups",note:"Στον πάγκο του bench press"},{name:"Seated shoulder press",note:"Κλίση στο 6"}],
  A2:[{name:"Cable rows",note:""},{name:"Smith machine chin ups",note:"Σωματικό βάρος"},{name:"Cable crossover",note:"4η πλάκα"},{name:"Lateral raises",note:""}],
  B1:[{name:"Alternating bicep curls",note:""},{name:"Tricep push down (rope)",note:"5 πλάκες, τροχαλία κάτω ορόφου"},{name:"Leg extension",note:""},{name:"Leg curls",note:""}],
  B2:[{name:"Alternating hammer curls",note:""},{name:"Straight bar push down",note:"≈2 πλάκες πριν τη μεγάλη"},{name:"Leg press",note:""},{name:"Γάμπες",note:""},{name:"Walking lunges",note:"Χωρίς βάρος"}]
};

/* ---------- storage ---------- */
var EK="gymlog.exercises.v1", SK="gymlog.sessions.v1";
function read(k,f){try{var r=localStorage.getItem(k);return r?JSON.parse(r):f;}catch(e){return f;}}
function write(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
var exercises=read(EK,null);
var sessions=read(SK,[]);
function latestNote(key,name){
  var ss=sessions.filter(function(s){return s.key===key;}).sort(function(a,b){return a.date<b.date?1:a.date>b.date?-1:b.id-a.id;});
  for(var i=0;i<ss.length;i++){for(var j=0;j<ss[i].entries.length;j++){var e=ss[i].entries[j];if(e.name===name&&e.notes)return e.notes;}}
  return "";
}
function migrateExercises(ex){
  if(!ex)return JSON.parse(JSON.stringify(DEFAULTS));
  var out={};
  ORDER.forEach(function(k){
    var arr=ex[k]||(DEFAULTS[k]?JSON.parse(JSON.stringify(DEFAULTS[k])):[]);
    out[k]=arr.map(function(it){return (typeof it==="string")?{name:it,note:""}:{name:it.name,note:it.note||""};});
  });
  ORDER.forEach(function(k){out[k].forEach(function(it){if(!it.note)it.note=latestNote(k,it.name);});});
  return out;
}
exercises=migrateExercises(exercises);
saveEx();
var CK="gymlog.cardio.v1", WK="gymlog.weight.v1";
var cardios=read(CK,[]);
var bweights=read(WK,[]);
function saveCardio(){write(CK,cardios);}
function saveWeight(){write(WK,bweights);}
var SPORTS=[["Τρέξιμο","🏃"],["Περπάτημα","🚶"],["Κολύμπι","🏊"],["Rowing","🚣"],["Bike","🚴"]];
function saveEx(){write(EK,exercises);}
function saveSess(){write(SK,sessions);}

/* ---------- helpers ---------- */
function el(id){return document.getElementById(id);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function todayISO(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtDate(iso){var p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function num(v){if(v==null)return null;v=String(v).trim().replace(",",".");if(v==="")return null;var n=parseFloat(v);return isNaN(n)?null:n;}
function fmtPerf(e){if(!e)return null;var s=e.sets,r=e.reps,w=e.weight;var base=null;
  if(s!=null&&r!=null)base=s+"×"+r; else if(s!=null)base=s+" σετ"; else if(r!=null)base=r+" επ.";
  if(w!=null)base=(base?base+" · ":"")+w+"kg";
  if(!base&&e.notes)base=e.notes;
  return base;}
function fmtNums(e){if(!e)return null;var s=e.sets,r=e.reps,w=e.weight;var base=null;
  if(s!=null&&r!=null)base=s+"×"+r;else if(s!=null)base=s+" σετ";else if(r!=null)base=r+" επ.";
  if(w!=null)base=(base?base+" · ":"")+w+"kg";return base;}
function lastSessionFor(key){
  var best=null;
  for(var i=0;i<sessions.length;i++){var s=sessions[i];if(s.key===key){if(!best||s.date>best.date||(s.date===best.date&&s.id>best.id))best=s;}}
  return best;
}
function lastMap(key){var s=lastSessionFor(key);var m={};if(s){for(var i=0;i<s.entries.length;i++){m[s.entries[i].name]=s.entries[i];}}return {map:m,date:s?s.date:null};}
function suggestNext(){
  if(!sessions.length)return "A1";
  var last=sessions.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:a.id-b.id;}).pop();
  var i=ORDER.indexOf(last.key);
  return ORDER[(i+1)%ORDER.length];
}
function toast(msg){var t=el("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1900);}

/* ---------- router ---------- */
var view={name:"home"};
function go(v){view=v;render();window.scrollTo(0,0);}

function render(){
  if(view.name==="home")renderHome();
  else if(view.name==="workout")renderWorkout(view.key);
  else if(view.name==="history")renderHistory();
  else if(view.name==="calendar")renderCalendar(view.y,view.mo);
  else if(view.name==="exdetail")renderExDetail(view.key,view.exName);
  else if(view.name==="cardio")renderCardio();
  else if(view.name==="weight")renderWeight();
}

function cardioDays(){var s={};for(var i=0;i<cardios.length;i++)s[cardios[i].date]=true;return s;}
function activeDays(){var g=gymDays(),c=cardioDays(),u={};for(var k in g)u[k]=1;for(var k2 in c)u[k2]=1;return u;}
function countActive(a,b){var u=activeDays(),n=0;for(var k in u){if(k>=a&&k<=b)n++;}return n;}
function latestWeight(){if(!bweights.length)return null;return bweights.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;}).pop();}

/* ---------- date / stats helpers ---------- */
function parseISO(iso){var p=iso.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function isoOf(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function mb(d){return (d.getDay()+6)%7;} // Monday=0
function fmtDM(iso){var p=iso.split("-");return p[2]+"/"+p[1];}
function gymDays(){var s={};for(var i=0;i<sessions.length;i++)s[sessions[i].date]=true;return s;}
function weekRange(d){var start=new Date(d);start.setDate(d.getDate()-mb(d));var end=new Date(start);end.setDate(start.getDate()+6);return {start:isoOf(start),end:isoOf(end)};}
function countRange(a,b){var set=gymDays(),n=0;for(var k in set){if(k>=a&&k<=b)n++;}return n;}
function exerciseHistory(key,name){
  var out=[];
  for(var i=0;i<sessions.length;i++){var s=sessions[i];if(s.key!==key)continue;for(var j=0;j<s.entries.length;j++){var e=s.entries[j];if(e.name===name)out.push({date:s.date,sets:e.sets,reps:e.reps,weight:e.weight,notes:e.notes});}}
  out.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  return out;
}

/* ---------- home ---------- */
function renderHome(){
  el("savebar").style.display="none";
  var nk=suggestNext(), nm=META[nk];
  var cards="";
  for(var i=0;i<ORDER.length;i++){
    var k=ORDER[i],m=META[k],up=(k===nk);
    var cnt=exercises[k].length;
    cards+='<div class="wcard'+(up?" up":"")+'" style="color:'+m.color+'" data-k="'+k+'">'+
      '<div class="bar" style="background:'+m.color+'"></div>'+
      '<span class="tag" style="background:'+(m.type==="Α"?"var(--Adim)":"var(--Bdim)")+';color:'+m.color+'">Τύπος '+m.tag+'</span>'+
      '<h3>Προπόνηση '+m.ses+'</h3>'+
      '<div class="mus">'+m.mus+'</div>'+
      '<div class="meta">'+cnt+' ασκήσεις'+(up?' · επόμενη':'')+'</div>'+
    '</div>';
  }
  el("app").innerHTML=
    '<div class="top">'+
      '<div class="brand"><div class="logo">'+logoSVG()+'</div>'+
        '<div><h1>Προπόνηση</h1><div class="sub">Ημερολόγιο</div></div></div>'+
      '<div style="display:flex;gap:8px">'+
        '<button class="iconbtn" id="calBtn" title="Ημερολόγιο">📅</button>'+
        '<button class="iconbtn" id="histBtn" title="Ιστορικό">🕘</button>'+
      '</div>'+
    '</div>'+
    '<div class="next" style="color:'+nm.color+'">'+
      '<span class="dot"></span>'+
      '<div class="k">Επόμενη προπόνηση</div>'+
      '<div class="v" style="color:'+nm.color+'">'+nm.full+'</div>'+
      '<div class="m">'+nm.mus+'</div>'+
    '</div>'+
    weekStripHTML()+
    bwCardHTML()+
    '<div class="seclabel">Διάλεξε προπόνηση</div>'+
    '<div class="grid stag">'+cards+'</div>'+
    '<div class="cardiocard" id="cardioCard"><div class="bar"></div>'+
      '<span class="cico">🏃</span>'+
      '<div><h3>Cardio</h3><div class="csub">Τρέξιμο · Περπάτημα · Κολύμπι · Rowing · Bike</div></div></div>'+
    '<div style="text-align:center;margin-top:22px"><button class="iconbtn" id="setBtn" style="width:auto;padding:0 16px;height:40px;font-size:13px;font-weight:700;color:var(--mut)">⚙︎ Ρυθμίσεις & αντίγραφο</button></div>';
  var gc=el("app").querySelectorAll(".wcard");
  for(var j=0;j<gc.length;j++){gc[j].style.animationDelay=(j*0.05)+"s";gc[j].addEventListener("click",(function(kk){return function(){go({name:"workout",key:kk});};})(gc[j].dataset.k));}
  el("histBtn").onclick=function(){go({name:"history"});};
  el("cardioCard").onclick=function(){go({name:"cardio"});};
  el("bwCard").onclick=function(){go({name:"weight"});};
  var now=new Date();
  el("calBtn").onclick=function(){go({name:"calendar",y:now.getFullYear(),mo:now.getMonth()});};
  var ws=el("weekStrip");if(ws)ws.onclick=function(){go({name:"calendar",y:now.getFullYear(),mo:now.getMonth()});};
  el("setBtn").onclick=openSettings;
}

function bwCardHTML(){
  var lw=latestWeight();
  return '<div class="bwcard" id="bwCard">'+
    '<div><div class="bwl">Σωματικό βάρος</div>'+
      '<div class="bwv">'+(lw?lw.kg+'<small> kg</small>':'<small style="font-size:14px">— πάτα για καταγραφή</small>')+'</div></div>'+
    '<div class="bwgo">καταγραφή ›</div></div>';
}
function dayClass(iso,g,c){var hg=!!g[iso],hc=!!c[iso];if(hg&&hc)return"onboth";if(hg)return"on";if(hc)return"oncardio";return"";}

function weekStripHTML(){
  var today=new Date(), wr=weekRange(today), g=gymDays(), c=cardioDays();
  var start=parseISO(wr.start), names=["Δ","Τ","Τ","Π","Π","Σ","Κ"], cells="", n=0;
  for(var i=0;i<7;i++){
    var d=new Date(start);d.setDate(start.getDate()+i);var iso=isoOf(d),cls=dayClass(iso,g,c),isToday=(iso===isoOf(today));
    if(cls)n++;
    cells+='<div class="wd"><span class="wdn">'+names[i]+'</span>'+
      '<span class="wdc'+(cls?" "+cls:"")+(isToday?" today":"")+'">'+d.getDate()+'</span></div>';
  }
  return '<div class="weekstrip" id="weekStrip">'+
    '<div class="wsh"><span class="wsl">Αυτή την εβδομάδα</span><span class="wsn">'+n+'<small> φορές</small></span></div>'+
    '<div class="wddays">'+cells+'</div></div>';
}

/* ---------- workout ---------- */
var editMode=false;
function renderWorkout(key){
  var m=META[key];
  var lm=lastMap(key);
  var list=exercises[key];
  var rows="";
  if(editMode){
    for(var i=0;i<list.length;i++){
      rows+='<div class="editrow" data-i="'+i+'">'+
        '<input class="rn" value="'+esc(list[i].name)+'" data-i="'+i+'">'+
        '<button class="minibtn" data-act="up" data-i="'+i+'">▲</button>'+
        '<button class="minibtn" data-act="down" data-i="'+i+'">▼</button>'+
        '<button class="minibtn del" data-act="del" data-i="'+i+'">✕</button>'+
      '</div>';
    }
    rows+='<button class="addex" id="addEx">+ Προσθήκη άσκησης</button>';
  }else{
    for(var i2=0;i2<list.length;i2++){
      var item=list[i2], nm=item.name, prev=lm.map[nm], pstr=prev?fmtNums(prev):null;
      rows+='<div class="ex" data-ex="'+esc(nm)+'" data-i="'+i2+'">'+
        '<div class="exhead"><div class="name">'+esc(nm)+'</div><button class="prog" data-ex="'+esc(nm)+'" title="Πρόοδος">📈</button></div>'+
        '<div class="exnotewrap"><span class="exnoteic">✎</span><input class="exnote" data-i="'+i2+'" value="'+esc(item.note)+'" placeholder="Μόνιμη σημείωση (π.χ. κλίση στο 6, 4η πλάκα)"></div>'+
        '<div class="prev">'+
          (prev?('<span class="lab">Προηγ.</span><span class="val" style="color:'+m.color+'">'+esc(pstr||"—")+'</span>'+
                 (pstr?'<button class="copy" data-act="copy">= ίδιο</button>':''))
               :'<span class="none">Πρώτη φορά — δεν υπάρχει προηγούμενη μέτρηση</span>')+
        '</div>'+
        '<div class="inputs">'+
          '<div class="field"><label>Σετ</label><input inputmode="numeric" data-f="sets"></div>'+
          '<div class="field"><label>Επαν.</label><input inputmode="numeric" data-f="reps"></div>'+
          '<div class="field"><label>Κιλά</label><input inputmode="decimal" data-f="weight"></div>'+
        '</div>'+
      '</div>';
    }
  }
  el("app").innerHTML=
    '<div class="head">'+
      '<button class="back" id="backBtn">‹</button>'+
      '<div class="htitle"><h2>Προπόνηση '+m.ses+'</h2>'+
        '<div class="hsub"><b style="color:'+m.color+'">Τύπος '+m.tag+'</b> · '+m.mus+'</div></div>'+
    '</div>'+
    '<span class="datechip" style="background:'+m.color+'">📅 '+fmtDate(todayISO())+(lm.date?'  ·  τελευταία: '+fmtDate(lm.date):'')+'</span>'+
    '<div class="stag">'+rows+'</div>';

  var sb=el("savebar");sb.style.display="block";
  sb.innerHTML='<div class="inner rowbtns">'+
    '<button class="btn ghost" id="editBtn" style="flex:0 0 52%">'+(editMode?'✓ Τέλος':'✎ Ασκήσεις')+'</button>'+
    (editMode?'':'<button class="btn" id="saveBtn" style="flex:1;background:'+m.color+'">✓ Ολοκλήρωση</button>')+
    (editMode?'<button class="btn" id="doneBtn" style="flex:1;background:'+m.color+'">Τέλος</button>':'')+
  '</div>';

  el("backBtn").onclick=function(){if(editMode){syncNames(key);saveEx();}editMode=false;go({name:"home"});};
  var eb=el("editBtn");if(eb)eb.onclick=function(){if(editMode){syncNames(key);saveEx();}editMode=!editMode;renderWorkout(key);};
  var db=el("doneBtn");if(db)db.onclick=function(){syncNames(key);saveEx();editMode=false;renderWorkout(key);};

  // animations
  var items=el("app").querySelectorAll(".stag>*");
  for(var a=0;a<items.length;a++)items[a].style.animationDelay=(a*0.04)+"s";

  if(editMode){
    bindEdit(key);
  }else{
    bindCopy(key,lm);
    bindNotes(key);

function bindCopy(key,lm){

function bindEdit(key){

  var btns=el("app").querySelectorAll(".minibtn");
  btns.forEach(function(b){

      syncNames(key);

function syncNames(key){

function doSave(key){
  syncNotesFromDOM(key);
  var cards=el("app").querySelectorAll(".ex");
  var entries=[];
  cards.forEach(function(card){
    var idx=parseInt(card.dataset.i,10),name=card.dataset.ex;

    card.querySelectorAll(".inputs input").forEach(function(inp){o[inp.dataset.f]=num(inp.value);});

  sessions.push({id:Date.now(),date:todayISO(),key:key,entries:entries});
  saveSess();

function chartSVG(pts,color,unit){
  var W=324,H=170,pl=36,pr=14,pt=16,pb=30;
  var iw=W-pl-pr, ih=H-pt-pb;
  var vals=pts.map(function(p){return p.v;});
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  if(mn===mx){mn=mn-1;mx=mx+1;}
  var pad=(mx-mn)*0.12; mn-=pad; mx+=pad;
  function X(i){return pts.length<=1?pl+iw/2:pl+iw*(i/(pts.length-1));}
  function Y(v){return pt+ih*(1-(v-mn)/(mx-mn));}
  var line="",dots="";
  for(var i=0;i<pts.length;i++){line+=(i?" ":"")+X(i).toFixed(1)+","+Y(pts[i].v).toFixed(1);dots+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(pts[i].v).toFixed(1)+'" r="3.4" fill="'+color+'"/>';}
  var area='<polyline points="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>';
  var gy='<line x1="'+pl+'" y1="'+pt+'" x2="'+pl+'" y2="'+(pt+ih)+'" stroke="rgba(255,255,255,.1)"/>'+
         '<line x1="'+pl+'" y1="'+(pt+ih)+'" x2="'+(W-pr)+'" y2="'+(pt+ih)+'" stroke="rgba(255,255,255,.1)"/>';
  var ylab='<text x="'+(pl-6)+'" y="'+(Y(mx)+4)+'" class="caxt" text-anchor="end">'+(Math.round(mx*10)/10)+'</text>'+
           '<text x="'+(pl-6)+'" y="'+(Y(mn)+4)+'" class="caxt" text-anchor="end">'+(Math.round(mn*10)/10)+'</text>';
  var xlab='<text x="'+pl+'" y="'+(H-9)+'" class="caxt" text-anchor="start">'+pts[0].label+'</text>';
  if(pts.length>1)xlab+='<text x="'+(W-pr)+'" y="'+(H-9)+'" class="caxt" text-anchor="end">'+pts[pts.length-1].label+'</text>';
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">'+gy+area+dots+ylab+xlab+'</svg>';
}

    '<button class="sopt" id="impBtn"><span class="ic">⬆︎</span><span>Εισαγωγή αντιγράφου<small>Επαναφορά από αρχείο .json</small></span></button>'+
    '<button class="sopt" id="resetEx"><span class="ic">↺</span><span>Επαναφορά προεπιλεγμένων ασκήσεων<small>Δεν σβήνει το ιστορικό σου</small></span></button>'+
    '<button class="sopt" id="closeSet" style="color:var(--mut)"><span class="ic">✕</span><span>Κλείσιμο</span></button>'+
    '<input type="file" id="impFile" accept="application/json,.json" style="display:none">';
  el("modal").classList.add("open");
  el("closeSet").onclick=closeSettings;
  el("expBtn").onclick=doExport;
  el("impBtn").onclick=function(){el("impFile").click();};
  el("impFile").onchange=doImport;
  el("resetEx").onclick=function(){if(confirm("Επαναφορά της λίστας ασκήσεων στις προεπιλογές;")){exercises=JSON.parse(JSON.stringify(DEFAULTS));saveEx();closeSettings();toast("Έγινε επαναφορά");}};
}
function closeSettings(){el("modal").classList.remove("open");}
el("modal").addEventListener("click",function(e){if(e.target===el("modal"))closeSettings();});

function doExport(){
  var data={app:"gymlog",exported:todayISO(),exercises:exercises,sessions:sessions,cardios:cardios,bweights:bweights};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="propon-backup-"+todayISO()+".json";document.body.appendChild(a);a.click();a.remove();
  toast("Κατέβηκε το αντίγραφο");
}
function doImport(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(){
    try{var d=JSON.parse(r.result);
      if(d.sessions)sessions=d.sessions;
      if(d.exercises)exercises=d.exercises;
      if(d.cardios)cardios=d.cardios;
      if(d.bweights)bweights=d.bweights;
      saveSess();saveEx();saveCardio();saveWeight();closeSettings();go({name:"home"});toast("Εισήχθη το αντίγραφο");
    }catch(err){alert("Μη έγκυρο αρχείο.");}
  };
  r.readAsText(f);
}

function logoSVG(){return '<svg viewBox="0 0 24 24" fill="none"><rect x="2.5" y="9" width="2.6" height="6" rx="1" fill="#b8ff3c"/><rect x="5.4" y="7.4" width="2.6" height="9.2" rx="1" fill="#b8ff3c"/><rect x="8" y="10.7" width="8" height="2.6" rx="1.3" fill="#b8ff3c"/><rect x="16" y="7.4" width="2.6" height="9.2" rx="1" fill="#b8ff3c"/><rect x="18.9" y="9" width="2.6" height="6" rx="1" fill="#b8ff3c"/></svg>';}

render();
</script>
